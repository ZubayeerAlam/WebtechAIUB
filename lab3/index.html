<body>

    <h1>CSS Box Model & Display Properties</h1>

    <!-- Part A -->
     <div style="display: flex; justify-content: space-between;">
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">Box 3</div>
</div>
    

    <hr>

    <!-- Part C: Display Properties -->
    <h2>Display Examples</h2>

    <div class="block-example">Block Element (div)</div>

    <div style="display: flex; justify-content: space-around;">
        <span class="inline-example">switch </span>
    <span class="inline-example">switch</span>

    <p class="inline-block-example">Inline-Block </p>

    <p class="none-example">This paragraph has display: none</p>
    </div>

    <hr>

    <!-- Part D: Visibility vs Display -->
    <h2>Visibility vs Display</h2>

    <div class="visibility-hidden">This uses visibility: hidden</div>
    <div class="normal-box">Visible Box Below</div>
